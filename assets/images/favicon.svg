<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D74DA"/>
      <stop offset="45%" stop-color="#4A9BE6"/>
      <stop offset="80%" stop-color="#78C850"/>
      <stop offset="100%" stop-color="#C9D93B"/>
    </linearGradient>
  </defs>
  <style>
    /* По умолчанию (для светлой темы браузера) — Стокгольмский синий */
    .monogram {
      stroke: #4A6B82;
    }
    
    /* Для темной темы браузера — цвет автоматически меняется на мягкий белый */
    @media (prefers-color-scheme: dark) {
      .monogram {
        stroke: #F4F1EA;
      }
    }
  </style>
  
  <!-- Группа элементов нашей шведской монограммы -->
  <g class="monogram" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Буква О (внешний круг) -->
    <circle cx="16" cy="16" r="13" />
    
    <!-- Центральная ось для буквы Н и спинка для Е -->
    <line x1="16" y1="3" x2="16" y2="29" />
    
    <!-- Перемычки для буквы Е (слева) -->
    <line x1="8" y1="10" x2="16" y2="10" />
    <line x1="6" y1="16" x2="16" y2="16" />
    <line x1="8" y1="22" x2="16" y2="22" />
    
    <!-- Перемычка для буквы Н (справа) -->
    <line x1="16" y1="16" x2="26" y2="16" />
  </g>
</svg>